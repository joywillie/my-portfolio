<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Joy Willie</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: white;
      padding: 25px;
      width: 320px;
      border-radius: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }

    .link {
      text-align: center;
      margin-top: 10px;
      cursor: pointer;
      color: blue;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Login</h2>

  <input type="email" placeholder="Email" id="email">
  <input type="password" placeholder="Password" id="password">

  <button onclick="login()">Login</button>

  <div class="link" onclick="goSignup()">
    Don't have an account? Sign up
  </div>
</div>

<script>
function login() {
  localStorage.setItem("loggedIn", "true");
  window.location.href = "index.html";
}

function goSignup() {
  window.location.href = "signup.html";
}
</script>

</body>
</html>
